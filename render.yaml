services:
  - type: web
    name: pixel-english-quest-api
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/VincentPaul434/pixel-english-quest-api.git
    branch: pixel-features
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: DB_POOL_SIZE
        value: 5
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TEACHER_INVITE_CODE
        sync: false
      - key: EMAIL_WEBHOOK_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: learning-assets
